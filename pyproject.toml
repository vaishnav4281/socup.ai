[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short --cov=core --cov=skills --cov-report=term-missing --cov-report=xml:coverage.xml --ignore=tests/local_tests"
log_cli = true
log_cli_level = "WARNING"

[tool.coverage.run]
branch = true
source = ["core", "skills"]

[tool.coverage.report]
show_missing = true
skip_covered = false
