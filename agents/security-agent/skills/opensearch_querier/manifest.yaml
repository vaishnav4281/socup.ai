name: opensearch_querier
routing_group: evidence_search
orchestration_role: direct
capability_groups:
  - evidence_search
  - direct_lookup
answer_types:
  - evidence-backed log search
  - traffic and flow retrieval
  - direct record lookup with known schema
artifact_inputs:
  - schema_discovery
  - discovered_fields  # CRITICAL: Must come from fields_querier
artifact_outputs:
  - results
  - results_count
  - aggregated_ports
  - protocols
  - time_range
description: >
  DATA-AGNOSTIC OpenSearch query executor.
  
  !!!CRITICAL CONSTRAINT!!!
  This skill ONLY operates with discovered field names from fields_querier.
  DO NOT add hardcoded field name assumptions to future versions.
  
  REQUIRES: fields_querier to have run first and discovered:
    - destination_ip_field (e.g., "destination.ip" or "dest_ip")
    - destination_port_field (e.g., "destination.port" or "dest_port")
    - protocol_field (optional, e.g., "network.transport")
  
  Returns: Aggregated ports with observation counts for fingerprinting

can_answer:
  - "direct log search and filter queries against OpenSearch"
  - "traffic to IPs (after field discovery)"
  - "connection patterns to targets"
  - "ports in use on servers"
  - "network flows after schema known"

cannot_answer:
  - "field schema discovery (use fields_querier)"
  - "user-friendly term to field mapping (use fields_querier)"
  - "generic queries without schema (data-agnostic requires discovery first)"
  - "any field question without running fields_querier first"

priority_keywords:
  - "traffic to"
  - "ports on"
  - "fingerprint"
  - "flows to"

min_prior_context: 1
  # MUST have fields_querier results to know actual field names
  # Will reject and error if fields_querier hasn't run

prerequisites:
  - skill: fields_querier
    required: true
    reason: "Discover actual field names (destination_ip_field, destination_port_field, protocol_field)"
    must_succeed: true

returns:
  - results (raw log records)
  - results_count
  - countries
  - ports
  - protocols
  - time_range

response_formatter: skills.opensearch_querier.hooks:format_response

notes:
  - Use AFTER fields_querier for field schema discovery
  - Use AFTER baseline_querier if RAG results need pagination/precise filters
  - Use directly only if field names are explicitly mentioned

conditional_prerequisites:
  - groups:
      - schema_discovery
    when_any_question_patterns:
      - regex: '\b(?:alerts?|signals?|events?|traffic|flows?|connections?|logs?|ports?|protocols?|signatures?|suricata|snort|et\s+[a-z0-9_\-]+|country|countries)\b'
    skip_if_explicit_field_syntax: true
    skip_if_result_exists_for_groups:
      - schema_discovery

conditional_recovery:
  - position: front
    when_any_question_patterns:
      - regex: '(?=.*\b(?:show|find|search|check|list|get|what|which|when|who|where|display|pull|visited|visit|seen|look for|from|to)\b)(?=.*\b(?:traffic|flows?|connections?|logs?|events?|ports?|protocols?|countries?|ips?|hosts?)\b)'
    skip_if_result_exists_for_skills:
      - opensearch_querier
    requires_result_predicates:
      - skill: fields_querier
        any_paths_truthy:
          - field_mappings
          - findings.field_mappings
